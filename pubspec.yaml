publish_to: "none"
version: 1.0.2+3

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  intl: ^0.20.2
  path: ^1.9.0
  path_provider: ^2.1.5
  sqflite: ^2.4.1
  archive: ^4.0.9
  flutter_map: ^8.3.1
  geolocator: ^14.0.3
  latlong2: ^0.9.1
  share_plus: ^13.1.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/sorgun_seed_data.json
