name: Android APK

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Validate release version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -eu
          PUBSPEC_VERSION="$(grep '^version:' pubspec.yaml | awk '{print $2}')"
          VERSION_NAME="${PUBSPEC_VERSION%%+*}"
          VERSION_CODE="${PUBSPEC_VERSION##*+}"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$VERSION_NAME" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} must match pubspec version name ${VERSION_NAME}."
            exit 1
          fi

          if ! printf "%s" "$VERSION_CODE" | grep -Eq '^[0-9]+$'; then
            echo "::error::pubspec version code must be a positive integer."
            exit 1
          fi

          PREVIOUS_TAG="$(git tag --sort=-v:refname --list 'v*' | grep -vx "${GITHUB_REF_NAME}" | head -n 1 || true)"
          if [ -n "$PREVIOUS_TAG" ]; then
            PREVIOUS_VERSION="$(git show "${PREVIOUS_TAG}:pubspec.yaml" | grep '^version:' | awk '{print $2}')"
            PREVIOUS_CODE="${PREVIOUS_VERSION##*+}"
            if printf "%s" "$PREVIOUS_CODE" | grep -Eq '^[0-9]+$' && [ "$VERSION_CODE" -le "$PREVIOUS_CODE" ]; then
              echo "::error::pubspec version code ${VERSION_CODE} must be greater than previous release ${PREVIOUS_TAG} code ${PREVIOUS_CODE}."
              exit 1
            fi
          fi

      - name: Prepare release signing
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu

          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || \
             [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || \
             [ -z "$ANDROID_KEY_ALIAS" ] || \
             [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "::error::Missing Android release signing secrets. Add ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD."
            exit 1
          fi

          mkdir -p "$RUNNER_TEMP/android-signing"
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/android-signing/release-keystore.jks"

          {
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/android-signing/release-keystore.jks"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
          } >> "$GITHUB_ENV"

      - name: Build release APK
        run: flutter build apk --release

      - name: Verify release APK signature
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -eu
          BUILD_TOOLS_DIR="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          "$BUILD_TOOLS_DIR/apksigner" verify --verbose --print-certs build/app/outputs/flutter-apk/app-release.apk

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: sorgun-emlak-defteri-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload signed release APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: sorgun-emlak-defteri-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Prepare release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk "release/sorgun-emlak-defteri-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "release/sorgun-emlak-defteri-${GITHUB_REF_NAME}.apk" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "release/sorgun-emlak-defteri-${GITHUB_REF_NAME}.apk" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Sorgun Emlak Defteri ${GITHUB_REF_NAME}" \
              --notes "Android APK dosyasi ekte. Telefona kurmak icin APK'yi indirip acin."
          fi
