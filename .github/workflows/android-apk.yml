name: Android APK

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Upload APKs
        uses: actions/upload-artifact@v7
        with:
          name: sorgun-emlak-defteri-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-debug.apk

      - name: Prepare release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk "release/sorgun-emlak-defteri-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" \
              "release/sorgun-emlak-defteri-${GITHUB_REF_NAME}.apk" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              "release/sorgun-emlak-defteri-${GITHUB_REF_NAME}.apk" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Sorgun Emlak Defteri ${GITHUB_REF_NAME}" \
              --notes "Android APK dosyasi ekte. Telefona kurmak icin APK'yi indirip acin."
          fi
